services:
  postgres:
    image: postgres:16-alpine
    platform: linux/amd64
    container_name: msh-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: msh
      POSTGRES_USER: msh
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-msh_secret}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - msh_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U msh -d msh"]
      interval: 5s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:4-management-alpine
    platform: linux/amd64
    container_name: msh-rabbitmq
    restart: unless-stopped
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-msh}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-msh_secret}
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    networks:
      - msh_network
    healthcheck:
      test: ["CMD", "rabbitmqctl", "status"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    platform: linux/amd64
    container_name: msh-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-msh}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-msh_secret}
    volumes:
      - minio_data:/data
    networks:
      - msh_network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

  createbuckets:
    image: minio/mc:latest
    platform: linux/amd64
    container_name: msh-createbuckets
    depends_on:
      minio:
        condition: service_healthy
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-msh}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-msh_secret}
    entrypoint: >
      /bin/sh -c "
      mc alias set msh http://minio:9000 $${MINIO_ROOT_USER} $${MINIO_ROOT_PASSWORD} &&
      mc mb --ignore-existing msh/msh-models &&
      mc anonymous set download msh/msh-models &&
      echo 'Bucket created and policy applied'
      "
    networks:
      - msh_network

  backend:
    build: ./backend
    image: ghcr.io/zenth96/msh-backend:latest
    platform: linux/amd64
    container_name: msh-backend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: postgresql://msh:${POSTGRES_PASSWORD:-msh_secret}@postgres:5432/msh
      RABBITMQ_URL: amqp://${RABBITMQ_USER:-msh}:${RABBITMQ_PASSWORD:-msh_secret}@rabbitmq:5672
      MINIO_ENDPOINT: minio
      MINIO_PORT: 9000
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER:-msh}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-msh_secret}
      MINIO_BUCKET: msh-models
      MINIO_USE_SSL: "false"
      JWT_SECRET: ${JWT_SECRET:-change_me_in_production}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      minio:
        condition: service_healthy
      createbuckets:
        condition: service_completed_successfully
    networks:
      - msh_network

  worker:
    build: ./worker
    image: ghcr.io/zenth96/msh-worker:latest
    platform: linux/amd64
    container_name: msh-worker
    restart: unless-stopped
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://msh:${POSTGRES_PASSWORD:-msh_secret}@postgres:5432/msh
      RABBITMQ_URL: amqp://${RABBITMQ_USER:-msh}:${RABBITMQ_PASSWORD:-msh_secret}@rabbitmq:5672
      MINIO_ENDPOINT: minio
      MINIO_PORT: 9000
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER:-msh}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-msh_secret}
      MINIO_BUCKET: msh-models
      MINIO_USE_SSL: "false"
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      minio:
        condition: service_healthy
    networks:
      - msh_network

  frontend:
    build: ./frontend
    image: ghcr.io/zenth96/msh-frontend:latest
    platform: linux/amd64
    container_name: msh-frontend
    restart: unless-stopped
    ports:
      - "4000:4000"
    environment:
      NODE_ENV: production
      PORT: 4000
      API_URL: ${API_URL:-http://localhost:3000}
    depends_on:
      - backend
    networks:
      - msh_network

volumes:
  postgres_data:
  rabbitmq_data:
  minio_data:

networks:
  msh_network:
    driver: bridge
