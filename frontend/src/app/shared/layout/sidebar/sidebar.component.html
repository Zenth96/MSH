<aside
  class="bg-sidebar text-sidebar-foreground sticky top-0 flex h-dvh flex-col shrink-0 overflow-y-auto border-r border-sidebar-border transition-all duration-300"
  [class.w-64]="!collapsed()"
  [class.w-16]="collapsed()"
>
  <div class="flex h-14 items-center gap-2.5 border-b border-sidebar-border px-4">
    <img
      src="logo.png"
      alt="MSH"
      class="h-8 w-8 shrink-0 rounded-lg object-contain"
    />
    @if (!collapsed()) {
      <span class="text-sidebar-foreground text-lg font-semibold tracking-tight">MSH</span>
    }
  </div>

  <nav class="flex-1 space-y-1 p-2">
    <a
      routerLink="/app/dashboard"
      routerLinkActive="bg-sidebar-accent text-sidebar-accent-foreground before:opacity-100"
      class="text-sidebar-foreground hover:bg-sidebar-accent hover:text-sidebar-accent-foreground relative flex w-full items-center gap-3 rounded-lg py-2 text-sm font-medium transition-all duration-300 before:absolute before:left-0 before:top-1/2 before:h-5 before:w-0.5 before:-translate-y-1/2 before:rounded-full before:bg-primary before:opacity-0 before:transition-opacity before:duration-300"
      [class.px-[14px]]="collapsed()"
      [class.px-3]="!collapsed()"
      [hlmTooltip]="'Dashboard'"
      [tooltipDisabled]="!collapsed()"
      [position]="'right'"
    >
      <ng-icon name="lucideLayoutDashboard" class="h-5 w-5 shrink-0" />
      @if (!collapsed()) {
        <span>Dashboard</span>
      }
    </a>

    <a
      routerLink="/app/projects"
      routerLinkActive="bg-sidebar-accent text-sidebar-accent-foreground before:opacity-100"
      class="text-sidebar-foreground hover:bg-sidebar-accent hover:text-sidebar-accent-foreground relative flex w-full items-center gap-3 rounded-lg py-2 text-sm font-medium transition-all duration-300 before:absolute before:left-0 before:top-1/2 before:h-5 before:w-0.5 before:-translate-y-1/2 before:rounded-full before:bg-primary before:opacity-0 before:transition-opacity before:duration-300"
      [class.px-[14px]]="collapsed()"
      [class.px-3]="!collapsed()"
      [hlmTooltip]="'Projects'"
      [tooltipDisabled]="!collapsed()"
      [position]="'right'"
    >
      <ng-icon name="lucideFolderOpen" class="h-5 w-5 shrink-0" />
      @if (!collapsed()) {
        <span>Projects</span>
      }
    </a>

    <a
      routerLink="/app/models"
      routerLinkActive="bg-sidebar-accent text-sidebar-accent-foreground before:opacity-100"
      class="text-sidebar-foreground hover:bg-sidebar-accent hover:text-sidebar-accent-foreground relative flex w-full items-center gap-3 rounded-lg py-2 text-sm font-medium transition-all duration-300 before:absolute before:left-0 before:top-1/2 before:h-5 before:w-0.5 before:-translate-y-1/2 before:rounded-full before:bg-primary before:opacity-0 before:transition-opacity before:duration-300"
      [class.px-[14px]]="collapsed()"
      [class.px-3]="!collapsed()"
      [hlmTooltip]="'Models'"
      [tooltipDisabled]="!collapsed()"
      [position]="'right'"
    >
      <ng-icon name="lucideBox" class="h-5 w-5 shrink-0" />
      @if (!collapsed()) {
        <span>Models</span>
      }
    </a>

    <div class="my-1">
      <hlm-separator />
    </div>

    @if (isAdmin()) {
      <a
        routerLink="/app/admin/users"
        routerLinkActive="bg-sidebar-accent text-sidebar-accent-foreground before:opacity-100"
        class="text-sidebar-foreground hover:bg-sidebar-accent hover:text-sidebar-accent-foreground relative flex w-full items-center gap-3 rounded-lg py-2 text-sm font-medium transition-all duration-300 before:absolute before:left-0 before:top-1/2 before:h-5 before:w-0.5 before:-translate-y-1/2 before:rounded-full before:bg-primary before:opacity-0 before:transition-opacity before:duration-300"
        [class.px-[14px]]="collapsed()"
        [class.px-3]="!collapsed()"
        [hlmTooltip]="'Admin'"
        [tooltipDisabled]="!collapsed()"
        [position]="'right'"
      >
        <ng-icon name="lucideShield" class="h-5 w-5 shrink-0" />
        @if (!collapsed()) {
          <span>Admin</span>
        }
      </a>
    }
  </nav>

  <div class="border-t border-sidebar-border p-2 shrink-0">
    <div
      class="flex items-center rounded-lg py-2 transition-all duration-300"
      [class.px-3]="!collapsed()"
      [class.px-2]="collapsed()"
      [class.gap-3]="!collapsed()"
      [class.gap-0]="collapsed()"
    >
      <hlm-avatar class="h-8 w-8 shrink-0 rounded-lg">
        <div class="bg-sidebar-primary flex h-full w-full items-center justify-center rounded-lg text-xs font-medium text-sidebar-primary-foreground">
          {{ currentUser()?.name?.charAt(0) ?? '?' }}
        </div>
      </hlm-avatar>
      @if (!collapsed()) {
        <div class="flex flex-1 flex-col overflow-hidden">
          <span class="truncate text-sm font-medium">{{ currentUser()?.name }}</span>
          <span class="text-muted-foreground truncate text-xs">{{ currentUser()?.role }}</span>
        </div>
        <button
          hlmBtn
          variant="ghost"
          size="icon"
          class="h-8 w-8 shrink-0"
          (click)="logout()"
        >
          <ng-icon name="lucideLogOut" class="h-4 w-4" />
        </button>
      }
    </div>

    <button
      hlmBtn
      variant="ghost"
      size="icon"
      class="mt-1 flex w-full items-center justify-center"
      (click)="toggle()"
    >
      @if (collapsed()) {
        <ng-icon name="lucideChevronsRight" class="h-4 w-4" />
      } @else {
        <ng-icon name="lucideChevronsLeft" class="h-4 w-4" />
      }
    </button>
  </div>
</aside>
